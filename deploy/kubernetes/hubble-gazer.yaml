apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble-gazer
  namespace: kube-system
  labels:
    app: hubble-gazer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hubble-gazer
  template:
    metadata:
      labels:
        app: hubble-gazer
    spec:
      containers:
      - name: hubble-gazer
        image: ghcr.io/iximiuz/hubble-gazer:v0.1.0
        ports:
        - containerPort: 3000
        env:
        - name: HUBBLE_RELAY_ADDR
          value: hubble-relay.kube-system.svc.cluster.local:4245
        - name: LISTEN_ADDR
          value: ":3000"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hubble-gazer
  namespace: kube-system
  labels:
    app: hubble-gazer
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: hubble-gazer
