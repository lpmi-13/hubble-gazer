name: CI Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test Go
        run: go test ./...

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
